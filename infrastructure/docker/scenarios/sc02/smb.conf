[global]
   workgroup = NEXORA
   realm = NEXORA.LOCAL
   netbios name = NEXORA-FS01
   security = ADS

   server string = Nexora Central File Storage
   log file = /var/log/samba/log.%m
   max log size = 50
   log level = 2

   # Kerberos authentication
   kerberos method = secrets and keytab
   dedicated keytab file = /etc/krb5.keytab

   # Samba 4 AD member settings
   idmap config * : backend = tdb
   idmap config * : range = 3000-7999
   idmap config NEXORA : backend = ad
   idmap config NEXORA : range = 10000-99999
   winbind use default domain = yes
   winbind offline logon = false

   # Encryption and authentication
   client max protocol = SMB3
   server max protocol = SMB3
   min protocol = SMB2

   # Audit/Logging
   vfs objects = full_audit
   full_audit:priority = notice
   full_audit:facility = LOCAL1
   full_audit:success = open opendir read write create mkdir rmdir unlink rename
   full_audit:failure = none

[Public]
   path = /srv/shares/public
   read only = no
   guest ok = yes
   comment = Public documents — no authentication required
   browseable = yes
   writable = yes
   force create mode = 0644
   force directory mode = 0755

[Finance]
   path = /srv/shares/finance
   read only = no
   valid users = @"NEXORA\Domain Users", NEXORA\jsmith
   comment = Finance department files — restricted access
   browseable = yes
   writable = yes
   force create mode = 0640
   force directory mode = 0750
   create mask = 0640
   directory mask = 0750

[Backups]
   path = /srv/shares/backups
   read only = no
   valid users = @"NEXORA\Domain Admins", NEXORA\svc_backup
   comment = Backup storage — restricted to admins and backup service
   browseable = no
   writable = yes
   create mask = 0600
   directory mask = 0700

[Admin]
   path = /srv/shares/admin
   read only = yes
   valid users = NEXORA\it.admin, @"NEXORA\Domain Admins"
   comment = IT administration logs — read-only
   browseable = no
