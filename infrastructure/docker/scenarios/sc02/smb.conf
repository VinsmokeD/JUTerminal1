[global]
   workgroup = NEXORA
   realm = NEXORA.LOCAL
   netbios name = NEXORA-FS01
   security = ADS

   server string = Nexora Central File Storage
   log file = /var/log/samba/log.%m
   max log size = 50

   # Kerberos
   kerberos method = secrets and keytab
   dedicated keytab file = /etc/krb5.keytab

   # Samba 4 AD member settings
   idmap config * : backend = tdb
   idmap config * : range = 3000-7999
   idmap config NEXORA : backend = ad
   idmap config NEXORA : range = 10000-99999
   winbind use default domain = yes
   winbind offline logon = false

[Public]
   path = /srv/shares/public
   read only = no
   guest ok = yes
   comment = Public documents — no auth required

[Finance]
   path = /srv/shares/finance
   read only = no
   valid users = @"NEXORA\Domain Users"
   comment = Finance department files

[Backups]
   path = /srv/shares/backups
   read only = no
   valid users = @"NEXORA\Domain Admins", NEXORA\svc_backup
   comment = Backup storage

[Admin]
   path = /srv/shares/admin
   read only = yes
   valid users = NEXORA\it.admin
   comment = IT admin logs
