name: cybersim

# ═══════════════════════════════════════════════════════════════════
#  CyberSim — Single-Node Docker Compose
#  Scenarios: SC-01 (Web App), SC-02 (Active Directory), SC-03 (Phishing)
#  Bring up core: docker-compose up -d
#  Bring up a scenario: docker-compose --profile sc01 up -d
# ═══════════════════════════════════════════════════════════════════

# Shared label applied to every CyberSim container.
# The docker-safe.ps1 wrapper reads this label before allowing removal.
x-cybersim-defaults: &cybersim-defaults
  labels:
    com.cybersim.protect: "true"
    com.cybersim.project: "JUTerminal1"

services:

  # ── Core Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cybersim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cybersim}
      POSTGRES_DB: ${POSTGRES_DB:-cybersim}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersim"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 2g

  # ── SIEM Pipeline ─────────────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.2
    user: root
    # --strict.perms=false required on Windows Docker Desktop:
    # bind-mounted files always appear as -rwxrwxrwx, which filebeat rejects.
    command: filebeat -e --strict.perms=false
    environment:
      - setup.kibana.host=kibana:5601
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infrastructure/docker/siem/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Application ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER:-cybersim}:${POSTGRES_PASSWORD:-cybersim}@postgres:5432/${POSTGRES_DB:-cybersim}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DOCKER_SOCKET=/var/run/docker.sock
    group_add:
      - "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./:/project:ro
      - ./backend/src:/app/src
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/migrations:/app/migrations:ro
      - ./ai-monitor:/app/ai-monitor:ro
      - ./docs/scenarios:/app/scenarios:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=${ENVIRONMENT:-development}
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost/api
      - VITE_WS_URL=ws://localhost/ws
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

  # ── SC-01: NovaMed Web App Pentest ────────────────────────────────
  # Start with: docker-compose --profile sc01 up -d
  sc01-webapp:
    build:
      context: ./infrastructure/docker/scenarios/sc01
      dockerfile: Dockerfile.webapp
    networks:
      sc01-net:
        ipv4_address: 172.20.1.20
    profiles: ["sc01"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  sc01-waf:
    image: owasp/modsecurity-crs:nginx
    networks:
      sc01-net:
        ipv4_address: 172.20.1.1
    profiles: ["sc01"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m

  # ── SC-02: Nexora Active Directory Compromise ─────────────────────
  # Start with: docker-compose --profile sc02 up -d
  sc02-dc:
    build:
      context: ./infrastructure/docker/scenarios/sc02
      dockerfile: Dockerfile.dc
    environment:
      - DOMAIN=nexora.local
      - REALM=NEXORA.LOCAL
      - NETBIOS_NAME=NEXORA
      - ADMINPASS=${SC02_ADMIN_PASS:-NexoraAdmin2024!}
    networks:
      sc02-net:
        ipv4_address: 172.20.2.20
    profiles: ["sc02"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "smbclient", "-L", "127.0.0.1", "-N"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  sc02-fileserver:
    build:
      context: ./infrastructure/docker/scenarios/sc02
      dockerfile: Dockerfile.fileserver
    environment:
      - DC_IP=172.20.2.20
      - DOMAIN=nexora.local
      - REALM=NEXORA.LOCAL
      - NETBIOS_NAME=NEXORA
    depends_on:
      sc02-dc:
        condition: service_healthy
    networks:
      sc02-net:
        ipv4_address: 172.20.2.40
    profiles: ["sc02"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "smbclient", "-L", "127.0.0.1", "-N"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  # ── SC-03: Orion Logistics Phishing Campaign ──────────────────────
  # Start with: docker-compose --profile sc03 up -d
  sc03-mailrelay:
    build:
      context: ./infrastructure/docker/scenarios/sc03
      dockerfile: Dockerfile.mailrelay
    networks:
      sc03-net:
        ipv4_address: 172.20.3.20
    profiles: ["sc03"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-zv", "127.0.0.1", "25"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  sc03-phish:
    build:
      context: ./infrastructure/docker/scenarios/sc03
      dockerfile: Dockerfile.gophish
    environment:
      - GOPHISH_ADMIN_PORT=3333
      - GOPHISH_PHISH_PORT=80
      - GOPHISH_PHISH_SSL_PORT=443
    networks:
      sc03-net:
        ipv4_address: 172.20.3.10
    depends_on:
      sc03-mailrelay:
        condition: service_healthy
    profiles: ["sc03"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pidof gophish > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  sc03-victim:
    build:
      context: ./infrastructure/docker/scenarios/sc03
      dockerfile: Dockerfile.victim
    networks:
      sc03-net:
        ipv4_address: 172.20.3.30
    depends_on:
      sc03-mailrelay:
        condition: service_healthy
    profiles: ["sc03"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

# ─────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  elastic_data:

networks:
  # Shared internal network for all core services
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.254

  # Isolated scenario networks (internal: true = no internet access)
  sc01-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24
          gateway: 172.20.1.254

  sc02-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24
          gateway: 172.20.2.254

  sc03-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.3.0/24
          gateway: 172.20.3.254
